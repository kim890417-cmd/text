<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이미지 용량 줄이기 | 블로그 도구모음</title>
  <link href='style.css' rel='stylesheet'>
  <style>
    .container { max-width: 800px; }
    .tool-settings {
      background-color: var(--background-alt-color);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .setting-item label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    .setting-item select, .setting-item input {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      background-color: var(--background-color);
      color: var(--text-color);
    }
    #results-container .result-item {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 15px;
      padding: 15px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
    }
    #results-container img {
      max-width: 150px;
      max-height: 150px;
      border-radius: 4px;
    }
    .result-info { flex-grow: 1; }
    .result-info p { margin: 0 0 5px 0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="short.html" class="nav-logo">블로그 도구모음</a>
      <ul class="nav-menu">
        <li><a href="short.html">단축 링크</a></li>
        <li><a href="index.html">동물상 테스트</a></li>
        <li><a href="lotto.html">로또 통계</a></li>
        <li><a href="blog.html">전문 블로그</a></li>
        <li><a href="tools.html" class="active">블로그 도구</a></li>
        <li><a href="about.html">소개</a></li>
        <li><a href="contact.html">문의하기</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1><i class="fas fa-compress-arrows-alt"></i> 이미지 용량 줄이기</h1>
      <p>품질 저하를 최소화하며 이미지 파일 크기를 최적화합니다.</p>
    </div>

    <input type="file" id="image-input" accept="image/*" multiple style="margin-bottom: 20px;">

    <div class="tool-settings">
      <div class="setting-item">
        <label for="format-select">저장 형식</label>
        <select id="format-select">
          <option value="jpeg">JPEG</option>
          <option value="webp">WebP</option>
          <option value="png">PNG</option>
        </select>
      </div>
      <div class="setting-item" id="quality-slider-container">
        <label for="quality-slider">품질 (1-100)</label>
        <input type="range" id="quality-slider" min="1" max="100" value="80">
      </div>
      <div class="setting-item">
        <label for="resize-select">크기 조절</label>
        <select id="resize-select">
          <option value="1">원본 크기 유지</option>
          <option value="0.75">75% 크기</option>
          <option value="0.5">50% 크기</option>
          <option value="0.25">25% 크기</option>
          <option value="custom">긴 변 직접 설정</option>
        </select>
      </div>
      <div class="setting-item" id="max-side-container" style="display:none;">
        <label for="max-side-input">긴 변 최대 (px)</label>
        <input type="number" id="max-side-input" value="1200" min="100">
      </div>
    </div>

    <button id="compress-btn" class="btn-primary" style="width:100%; margin-bottom: 20px;">📦 용량 줄이기 실행</button>
    
    <div id="summary" style="text-align:center; margin-bottom:20px;"></div>
    <div id="results-container"></div>
    <button id="download-all-btn" class="btn-primary" style="width:100%; display:none;">ZIP으로 전체 다운로드</button>

  </main>
  
  <footer>
     <!-- Footer content from tools.html -->
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="shared.js"></script>
  <script>
    const imageInput = document.getElementById('image-input');
    const formatSelect = document.getElementById('format-select');
    const qualitySlider = document.getElementById('quality-slider');
    const qualityContainer = document.getElementById('quality-slider-container');
    const resizeSelect = document.getElementById('resize-select');
    const maxSideContainer = document.getElementById('max-side-container');
    const maxSideInput = document.getElementById('max-side-input');
    const compressBtn = document.getElementById('compress-btn');
    const summaryEl = document.getElementById('summary');
    const resultsContainer = document.getElementById('results-container');
    const downloadAllBtn = document.getElementById('download-all-btn');

    let processedFiles = [];

    formatSelect.addEventListener('change', () => {
      qualityContainer.style.display = formatSelect.value === 'png' ? 'none' : 'block';
    });

    resizeSelect.addEventListener('change', () => {
      maxSideContainer.style.display = resizeSelect.value === 'custom' ? 'block' : 'none';
    });

    compressBtn.addEventListener('click', () => {
      if (imageInput.files.length === 0) {
        alert('이미지를 먼저 선택해주세요.');
        return;
      }
      processImages();
    });
    
    async function processImages() {
      resultsContainer.innerHTML = '<p>이미지 처리 중...</p>';
      processedFiles = [];
      let totalOriginalSize = 0;
      let totalCompressedSize = 0;

      for (const file of imageInput.files) {
        const result = await compressImage(file);
        processedFiles.push(result);
        totalOriginalSize += result.originalSize;
        totalCompressedSize += result.compressedSize;
      }

      displayResults();
      
      const reduction = 100 * (1 - totalCompressedSize / totalOriginalSize);
      summaryEl.innerHTML = `<b>총 ${processedFiles.length}개 파일 처리 완료!</b><br>
        원본: ${(totalOriginalSize / 1024).toFixed(0)} KB &rarr; 
        결과: ${(totalCompressedSize / 1024).toFixed(0)} KB (${reduction.toFixed(1)}% 감소)`;

      if (processedFiles.length > 1) {
        downloadAllBtn.style.display = 'block';
      }
    }
    
    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            
            let { width, height } = img;
            const resizeFactor = parseFloat(resizeSelect.value);

            if (resizeFactor !== 1) {
                width = Math.round(img.width * resizeFactor);
                height = Math.round(img.height * resizeFactor);
            } else if (resizeSelect.value === 'custom') {
                const maxSide = parseInt(maxSideInput.value);
                if (img.width > maxSide || img.height > maxSide) {
                    if (img.width > img.height) {
                        width = maxSide;
                        height = Math.round(img.height * (maxSide / img.width));
                    } else {
                        height = maxSide;
                        width = Math.round(img.width * (maxSide / img.height));
                    }
                }
            }

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);

            const format = formatSelect.value;
            const quality = parseInt(qualitySlider.value) / 100;
            const mimeType = `image/${format}`;

            canvas.toBlob(blob => {
              const originalSize = file.size;
              const compressedSize = blob.size;
              const fileName = file.name.split('.').slice(0, -1).join('.') + `_compressed.${format}`;
              
              resolve({
                fileName,
                blob,
                dataUrl: URL.createObjectURL(blob),
                width,
                height,
                originalSize,
                compressedSize,
              });
            }, mimeType, format === 'png' ? undefined : quality);
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function displayResults() {
        resultsContainer.innerHTML = '';
        processedFiles.forEach(file => {
            const reduction = 100 * (1 - file.compressedSize / file.originalSize);
            const item = document.createElement('div');
            item.className = 'result-item';
            item.innerHTML = `
                <img src="${file.dataUrl}" alt="${file.fileName}">
                <div class="result-info">
                    <p><b>${file.fileName}</b></p>
                    <p>크기: ${file.width}x${file.height}px</p>
                    <p>용량: ${(file.originalSize / 1024).toFixed(0)} KB &rarr; ${(file.compressedSize / 1024).toFixed(0)} KB (${reduction.toFixed(0)}% 감소)</p>
                </div>
                <a href="${file.dataUrl}" download="${file.fileName}" class="btn-secondary">저장</a>
            `;
            resultsContainer.appendChild(item);
        });
    }

    downloadAllBtn.addEventListener('click', () => {
        const zip = new JSZip();
        processedFiles.forEach(file => {
            zip.file(file.fileName, file.blob);
        });
        zip.generateAsync({type:"blob"}).then(function(content) {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "compressed_images.zip";
            link.click();
        });
    });

  </script>
</body>
</html>
