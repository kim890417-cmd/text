<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단축링크 만들기 | dream95.com</title>
  <meta name="description" content="긴 주소를 짧게 만들어주는 무료 URL 단축 서비스" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="bg-decoration"></div>

  <header class="site-header">
    <a href="/short.html" class="logo">🔗 단축링크</a>
    <nav>
      <a href="/" class="nav-link">메인으로</a>
      <a href="/stats.html" class="nav-link">통계 조회</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1>긴 주소를 <span class="accent">짧게</span></h1>
      <p class="subtitle">URL을 입력하면 짧은 링크로 바꿔드려요. 클릭 수도 확인할 수 있어요.</p>
    </section>

    <section class="card">
      <form id="shorten-form" autocomplete="off">
        <div class="input-row">
          <input
            type="url"
            id="long-url"
            placeholder="https://example.com/매우/긴/주소..."
            required
          />
          <button type="submit" id="submit-btn">짧게 만들기</button>
        </div>
        <div class="input-row optional">
          <input
            type="text"
            id="custom-alias"
            placeholder="원하는 별칭 (선택) — 예: my-event"
            pattern="[a-zA-Z0-9_-]+"
            title="영문, 숫자, -, _ 만 사용할 수 있어요"
          />
        </div>
      </form>

      <div id="result" class="result hidden">
        <div class="result-row">
          <a id="short-link" href="#" target="_blank" rel="noopener" class="short-url"></a>
          <button id="copy-btn" class="copy-btn" title="복사">복사</button>
        </div>
        <div class="result-meta">
          <a id="stats-link" href="#" class="meta-link">📊 클릭 통계 보기</a>
        </div>
      </div>

      <p id="error-msg" class="error-msg hidden"></p>
    </section>

    <section class="features">
      <div class="feature">⚡ <span>즉시 생성</span></div>
      <div class="feature">📊 <span>클릭 통계</span></div>
      <div class="feature">✏️ <span>커스텀 별칭</span></div>
      <div class="feature">🆓 <span>완전 무료</span></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>dream95.com 단축링크 · Cloudflare로 구동</p>
  </footer>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
