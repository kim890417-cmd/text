<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단축링크 만들기 | dream95.com</title>
  <meta name="description" content="긴 주소를 짧게 만들어주는 무료 URL 단축 서비스" />
  <link href='style.css' rel='stylesheet'>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="short.html" class="nav-logo">블로그 도구모음</a>
      <ul class="nav-menu">
        <li><a href="short.html" class="active">단축 링크</a></li>
        <li><a href="index.html">동물상 테스트</a></li>
        <li><a href="lotto.html">로또 통계</a></li>
        <li><a href="blog.html">전문 블로그</a></li>
        <li><a href="hub.html">정보 허브</a></li>
        <li><a href="keyword_analyzer.html">키워드 분석기</a></li>
        <li><a href="about.html">소개</a></li>
        <li><a href="contact.html">문의하기</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">
        <div class="card-container">
            <section class="hero">
                <h1>긴 주소를 <span class="accent">짧게</span></h1>
                <p class="subtitle">URL을 입력하면 짧은 링크로 바꿔드려요. 클릭 수도 확인할 수 있어요.</p>
            </section>

            <section class="card">
                <form id="shorten-form" autocomplete="off">
                    <div class="input-row">
                        <input type="url" id="long-url" placeholder="https://example.com/매우/긴/주소..." required />
                        <button type="submit" id="submit-btn">짧게 만들기</button>
                    </div>
                    <div class="input-row optional">
                        <input type="text" id="custom-alias" placeholder="원하는 별칭 (선택) — 예: my-event" pattern="[a-zA-Z0-9_-]+" title="영문, 숫자, -, _ 만 사용할 수 있어요" />
                    </div>
                </form>

                <div id="result" class="result hidden">
                    <div class="result-row">
                        <a id="short-link" href="#" target="_blank" rel="noopener" class="short-url"></a>
                        <button id="copy-btn" class="copy-btn" title="복사">복사</button>
                    </div>
                    <div class="result-meta">
                        <a id="stats-link" href="#" class="meta-link">📊 클릭 통계 보기</a>
                    </div>
                </div>

                <p id="error-msg" class="error-msg hidden"></p>
            </section>

            <section class="features">
                <div class="feature">⚡ <span>즉시 생성</span></div>
                <div class="feature">📊 <span>클릭 통계</span></div>
                <div class="feature">✏️ <span>커스텀 별칭</span></div>
                <div class="feature">🆓 <span>완전 무료</span></div>
            </section>
        </div>
    </div>
  </main>

  <footer></footer>

  <script src="shared.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
