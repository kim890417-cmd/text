<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추첨 - AI 도구 모음</title>
  <link href='style.css' rel='stylesheet'>
</head>
<body>
  <nav class="navbar">
    <a href="index.html">동물상 테스트</a>
    <a href="lotto.html" class="active">로또 추첨</a>
  </nav>

  <div class="container">
    <div style="text-align: right; margin-bottom: 10px;">
      <button id="theme-toggle">테마 변경</button>
    </div>
    <h1>로또 번호 추첨</h1>
    <p class="subtitle">오늘의 행운 번호를 뽑아보세요!</p>
    
    <button id="draw-button">추첨 시작</button>
    <div id="lotto-numbers"></div>

    <div class="contact-section">
      <hr>
      <h3>제휴 문의</h3>
      <form action="https://formspree.io/f/mnjrylje" method="POST">
        <input type="email" name="email" placeholder="이메일 주소" required>
        <textarea name="message" placeholder="문의 내용을 입력하세요" required></textarea>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
    </div>

    <div class="comment-section">
      <hr>
      <h3>댓글</h3>
      <div class="giscus"></div>
    </div>
  </div>
  
  <script src="https://giscus.app/client.js"
        data-repo="kim890417-cmd/text"
        data-repo-id="R_kgDOSs5wIg"
        data-category="Announcements"
        data-category-id="DIC_kwDOSs5wIs4C-NjD"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="ko"
        crossorigin="anonymous"
        async>
  </script>
  <script defer type="text/javascript" src="lotto.js"></script>
</body>
</html>
