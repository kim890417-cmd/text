<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추첨</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <div style="text-align: right; margin-bottom: 10px;">
      <button id="theme-toggle">테마 변경</button>
    </div>
    <h1>로또 번호 추첨</h1>
    <button id="draw-button">추첨 시작</button>
    <div id="lotto-numbers"></div>

    <div class="contact-section">
      <hr>
      <h3>제휴 문의</h3>
      <form action="https://formspree.io/f/mnjrylje" method="POST">
        <input type="email" name="email" placeholder="이메일 주소" required>
        <textarea name="message" placeholder="문의 내용을 입력하세요" required></textarea>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
    </div>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
