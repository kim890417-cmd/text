<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>클릭 통계 · 짧은링크</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="bg-decoration"></div>

  <header class="site-header">
    <a href="/" class="logo">🔗 짧은링크</a>
    <nav>
      <a href="/" class="nav-link">새 링크 만들기</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1>클릭 <span class="accent">통계</span></h1>
      <p class="subtitle">단축코드를 입력하면 해당 링크의 클릭 수를 보여드려요.</p>
    </section>

    <section class="card">
      <form id="stats-form" autocomplete="off">
        <div class="input-row">
          <input
            type="text"
            id="code-input"
            placeholder="단축코드 입력 — 예: aB3xK"
            required
          />
          <button type="submit">조회</button>
        </div>
      </form>

      <div id="stats-result" class="stats-result hidden">
        <div class="stat-big">
          <span id="click-count" class="stat-number">0</span>
          <span class="stat-label">번 클릭됨</span>
        </div>
        <dl class="stat-list">
          <div>
            <dt>단축 링크</dt>
            <dd><a id="stat-short" href="#" target="_blank" rel="noopener"></a></dd>
          </div>
          <div>
            <dt>원본 주소</dt>
            <dd id="stat-original" class="break"></dd>
          </div>
          <div>
            <dt>생성일</dt>
            <dd id="stat-created"></dd>
          </div>
        </dl>
      </div>

      <p id="stats-error" class="error-msg hidden"></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>dream95.com 단축링크 · Cloudflare로 구동</p>
  </footer>

  <script type="module" src="/js/stats.js"></script>
</body>
</html>
