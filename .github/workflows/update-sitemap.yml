name: Auto-update sitemap & RSS

on:
  push:
    branches: [main]
    paths:
      - 'health/**'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate sitemap.xml and rss.xml
        run: python3 scripts/generate_sitemap.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml rss.xml
          git diff --staged --quiet || (git commit -m "Auto-update sitemap and RSS" && git push)
